<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="utf-8">
  <title>LearncodeFrontend</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Spline Viewer -->
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.58/build/spline-viewer.js"></script>

  <!-- Google -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tailwind config -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: "#00A3FF",
            "background-light": "#F3F4F6",
            "background-dark": "#0A0C14",
          },
          fontFamily: {
            display: ["Inter", "sans-serif"],

        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .futuristic-gradient {
      background:
        radial-gradient(circle at top right, rgba(0, 163, 255, 0.15), transparent),
        radial-gradient(circle at bottom left, rgba(139, 92, 246, 0.1), transparent);
    }
  </style>
</head>

<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col transition-colors duration-300">
