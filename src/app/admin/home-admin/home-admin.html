<section *ngIf="slides && slides.length > 0" class="mb-12 group relative overflow-hidden rounded-3xl shadow-2xl">
    <div class="aspect-[21/9] w-full overflow-hidden relative">

        <img *ngFor="let slide of slides; let i = index" [src]="slide.image" [alt]="slide.title"
            class="absolute top-0 left-0 w-full h-full object-cover transition-opacity duration-700 ease-in-out"
            [class.opacity-0]="i !== currentIndex" [class.opacity-100]="i === currentIndex">
        <div class="absolute inset-0 bg-gradient-to-t from-slate-900/90 via-slate-900/20 to-transparent"></div>

        <div class="absolute inset-0 flex flex-col justify-end p-8 md:p-12">
            <div class="max-w-2xl">
                <span
                    class="inline-block px-3 py-1 bg-primary text-white text-xs font-bold uppercase tracking-wider rounded-full mb-4">
                    {{ slides[currentIndex].tag }}
                </span>
                <h1 class="text-4xl md:text-6xl font-bold text-white mb-6 leading-tight">
                    {{ slides[currentIndex].title }}
                </h1>
                <p class="text-slate-200 text-xl leading-relaxed hidden md:block">
                    {{ slides[currentIndex].description }}
                </p>
            </div>
        </div>

        <button (click)="prevSlide()"
            class="absolute left-6 top-1/2 -translate-y-1/2 w-12 h-12 flex items-center justify-center rounded-full bg-white/10 hover:bg-white/20 backdrop-blur-md text-white transition-opacity opacity-0 group-hover:opacity-100 border border-white/20">
            <span class="material-symbols-outlined">chevron_left</span>
        </button>

        <button (click)="nextSlide()"
            class="absolute right-6 top-1/2 -translate-y-1/2 w-12 h-12 flex items-center justify-center rounded-full bg-white/10 hover:bg-white/20 backdrop-blur-md text-white transition-opacity opacity-0 group-hover:opacity-100 border border-white/20">
            <span class="material-symbols-outlined">chevron_right</span>
        </button>

        <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex gap-3">
            <div *ngFor="let item of slides; let i = index" (click)="goToSlide(i)"
                class="cursor-pointer transition-all duration-300"
                [ngClass]="i === currentIndex ? 'w-10 h-1.5 bg-white rounded-full' : 'w-2.5 h-1.5 bg-white/40 rounded-full'">
            </div>
        </div>

    </div>
</section>

<div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16">

    <div class="stats-primary p-10 rounded-3xl text-white shadow-xl shadow-indigo-500/20 flex flex-col items-center justify-center text-center transition-transform hover:-translate-y-2 relative overflow-hidden group
           bg-gradient-to-tr from-blue-400 to-indigo-600 dark:from-[#6366f1] dark:to-[#4338ca]">
        <div class="absolute top-0 right-0 w-40 h-40 bg-white/10 rounded-full -mr-20 -mt-20 blur-3xl"></div>
        <div class="w-24 h-24 mb-6 bg-white/20 rounded-2xl flex items-center justify-center relative z-10">
            <span class="material-symbols-outlined text-6xl">computer</span>
        </div>
        <h3 class="text-2xl font-bold mb-2 relative z-10">Cursos</h3>
        <span class="text-7xl font-black tracking-tighter relative z-10">{{ totalCourses }}</span>
    </div>

    <div class="stats-purple p-10 rounded-3xl text-white shadow-xl shadow-purple-500/20 flex flex-col items-center justify-center text-center transition-transform hover:-translate-y-2 relative overflow-hidden group
           bg-gradient-to-tr from-purple-400 to-purple-700 dark:from-[#a855f7] dark:to-[#7e22ce]">
        <div class="absolute top-0 right-0 w-40 h-40 bg-white/10 rounded-full -mr-20 -mt-20 blur-3xl"></div>
        <div class="w-24 h-24 mb-6 bg-white/20 rounded-2xl flex items-center justify-center relative z-10">
            <span class="material-symbols-outlined text-6xl">school</span>
        </div>
        <h3 class="text-2xl font-bold mb-2 relative z-10">Estudiantes</h3>
        <span class="text-7xl font-black tracking-tighter relative z-10">{{ totalUsers }}</span>
    </div>

    <div class="stats-slate p-10 rounded-3xl text-white shadow-xl shadow-slate-500/20 flex flex-col items-center justify-center text-center transition-transform hover:-translate-y-2 relative overflow-hidden group
           bg-gradient-to-tr from-slate-500 to-slate-700 dark:from-[#334155] dark:to-[#0f172a]">
        <div class="absolute top-0 right-0 w-40 h-40 bg-white/5 rounded-full -mr-20 -mt-20 blur-3xl"></div>
        <div class="w-24 h-24 mb-6 bg-white/10 rounded-2xl flex items-center justify-center relative z-10">
            <span class="material-symbols-outlined text-6xl">payments</span>
        </div>
        <h3 class="text-2xl font-bold mb-2 relative z-10">Ingreso diario</h3>
        <span class="text-7xl font-black tracking-tighter relative z-10">$ {{ dailyIncome }}</span>
    </div>

</div>
