<header class="sticky top-0 z-50 w-full
           bg-white/70 dark:bg-gray-900/80
           backdrop-blur-md shadow-md border-b
           border-slate-200 dark:border-slate-800">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-20">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-gradient-to-br from-primary to-purple-600
                           rounded-xl flex items-center justify-center
                           shadow-lg shadow-primary/30">
                    <span class="material-symbols-outlined text-white text-2xl">
                        code
                    </span>
                </div>

                <a routerLink="/admin/dashboard">
                    <span class="text-2xl font-bold text-slate-900 dark:text-white">
                        Learn<span class="text-primary">Code</span>
                    </span>
                </a>
            </div>

            <nav class="hidden md:flex items-center space-x-8">

                <a routerLink="/admin/gestionCliente" routerLinkActive="active" class="text-lg font-medium
                          text-slate-700 dark:text-slate-100
                          hover:text-primary transition">
                    Clientes
                </a>

                <a routerLink="/admin/gestionCurso/listado" routerLinkActive="active" class="text-lg font-medium
                          text-slate-700 dark:text-slate-100
                          hover:text-primary transition">
                    Cursos
                </a>

                <a routerLink="/admin/gestionSuscripcion" routerLinkActive="active" class="text-lg font-medium
                          text-slate-700 dark:text-slate-100
                          hover:text-primary transition">
                    Suscripciones
                </a>

                <a routerLink="/admin/payments-history" routerLinkActive="active" class="text-lg font-medium
          text-slate-700 dark:text-slate-100
          hover:text-primary transition">
                    Historial de pagos
                </a>

                <a routerLink="/admin/statistics" routerLinkActive="active" class="text-lg font-medium
                          text-slate-700 dark:text-slate-100
                          hover:text-primary transition">
                    Estadísticas
                </a>

            </nav>

            <div class="flex items-center gap-3">
                <button (click)="toggleTheme()"
                    class="p-2 rounded-full bg-slate-200 dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:bg-slate-300 dark:hover:bg-slate-700 hover:scale-110 shadow-sm hover:shadow-md transition-all duration-300 flex items-center justify-center">
                    <span class="material-symbols-outlined" *ngIf="!isDarkMode">dark_mode</span>
                    <span class="material-symbols-outlined" *ngIf="isDarkMode">light_mode</span>
                </button>

                <button type="button" (click)="toggleMobileMenu()" class="md:hidden w-10 h-10 flex items-center justify-center
                           rounded-lg bg-slate-200 dark:bg-slate-800
                           text-slate-700 dark:text-slate-200
                           hover:bg-slate-300 dark:hover:bg-slate-700
                           transition">
                    <span class="material-symbols-outlined text-[22px]">
                        {{ mobileMenuOpen ? 'close' : 'menu' }}
                    </span>
                </button>

                <div class="flex items-center gap-3 pl-4 border-l
                           border-slate-200 dark:border-slate-800 relative">

                    <div class="text-right hidden sm:block">
                        <p class="text-sm font-semibold text-slate-900 dark:text-white">
                            {{ userName }}
                        </p>
                        <p class="text-xs text-slate-500 dark:text-slate-400">
                            Administrador
                        </p>
                    </div>

                    <button type="button" (click)="toggleMenu()" class="w-10 h-10 rounded-full overflow-hidden
                               border-2 border-primary/30
                               bg-slate-200 dark:bg-slate-800">
                        <img *ngIf="userPhoto; else defaultIcon" [src]="userPhoto"
                            class="w-10 h-10 rounded-full object-cover" />

                        <ng-template #defaultIcon>
                            <span class="material-symbols-outlined text-slate-600 dark:text-slate-300">
                                person
                            </span>
                        </ng-template>
                    </button>

                    <div *ngIf="menuOpen" class="absolute right-0 top-full mt-2 w-44
                               rounded-xl bg-white dark:bg-gray-800
                               shadow-lg overflow-hidden z-50">

                        <button (click)="logout()" class="w-full px-4 py-3 text-left text-sm
                                   text-slate-700 dark:text-slate-200
                                   hover:bg-slate-100 dark:hover:bg-slate-700
                                   transition flex items-center gap-2">
                            🚪 Cerrar sesión
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div *ngIf="mobileMenuOpen" class="md:hidden sticky top-20 z-40
                    bg-white/95 dark:bg-gray-900/95
                    backdrop-blur-md
                    border-t border-slate-200 dark:border-slate-700
                    shadow-lg">

            <nav class="flex flex-col px-6 py-4 space-y-4">

                <a routerLink="/admin/gestionCliente" routerLinkActive="active" (click)="toggleMobileMenu()" class="text-lg font-semibold
                          text-slate-800 dark:text-slate-100
                          hover:text-primary transition">
                    Clientes
                </a>

                <a routerLink="/admin/gestionCurso/listado" routerLinkActive="active" (click)="toggleMobileMenu()"
                    class="text-lg font-semibold
                          text-slate-800 dark:text-slate-100
                          hover:text-primary transition">
                    Cursos
                </a>

                <a routerLink="/admin/gestionSuscripcion" routerLinkActive="active" (click)="toggleMobileMenu()" class="text-lg font-semibold
                          text-slate-800 dark:text-slate-100
                          hover:text-primary transition">
                    Suscripciones
                </a>

                <a routerLink="/admin/payments-history" routerLinkActive="active" (click)="toggleMobileMenu()" class="text-lg font-semibold
          text-slate-800 dark:text-slate-100
          hover:text-primary transition">
                    Historial de pagos
                </a>

                <a routerLink="/admin/statistics" routerLinkActive="active" (click)="toggleMobileMenu()" class="text-lg font-semibold
                          text-slate-800 dark:text-slate-100
                          hover:text-primary transition">
                    Estadísticas
                </a>
            </nav>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <router-outlet></router-outlet>
</main>

<footer class="py-12 border-t border-slate-200 dark:border-slate-800">
    <div class="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-6">
        <div class="flex items-center gap-2 grayscale opacity-60">
            <div class="w-6 h-6 bg-gradient-to-br from-primary to-purple-600 rounded flex items-center justify-center">
                <span class="material-symbols-outlined text-[14px] text-white">code</span>
            </div>
            <span class="text-sm font-bold tracking-tight text-slate-900 dark:text-white">LearnCode</span>
        </div>
        <p class="text-slate-500 dark:text-slate-400 text-sm">
            © 2026 LearnCode Admin Panel. Todos los derechos reservados
        </p>
    </div>
</footer>
