<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <h1 class="text-4xl font-extrabold text-white mb-3">
    Detalle del Curso
  </h1>
  <p class="text-slate-400">
    Información completa del curso registrado.
  </p>
</div>

<div *ngIf="course" class="relative max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 mb-20">
  <div class="relative rounded-[32px] p-8 bg-slate-900/40 backdrop-blur-xl border border-cyan-400/20">
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      
      <div class="md:col-span-1">
        <label class="text-slate-400 text-sm mb-2 block">Título</label>
        <input [value]="course.title" disabled
               class="w-full h-12 px-5 rounded-xl bg-slate-950/60 border border-slate-800 text-slate-300" />
      </div>

      <div class="md:col-span-1">
        <label class="text-slate-400 text-sm mb-2 block">Subtítulo</label>
        <input [value]="course.subtitle" disabled
               class="w-full h-12 px-5 rounded-xl bg-slate-950/60 border border-slate-800 text-slate-300" />
      </div>

      <div class="md:col-span-2">
        <label class="text-slate-400 text-sm mb-2 block">Descripción</label>
        <textarea rows="4" disabled
                  class="w-full px-5 py-4 rounded-xl bg-slate-950/60 border border-slate-800 text-slate-300">{{ course.description }}</textarea>
      </div>

      <div class="md:col-span-1">
        <label class="text-slate-400 text-sm mb-3 block">Icono del Curso</label>
        <div *ngIf="course.iconUrl; else noIcon" class="flex items-center gap-4">
          <img [src]="course.iconUrl" class="w-16 h-16 rounded-xl object-cover border border-white/10" />
          <p class="text-xs text-slate-500 italic">Imagen cargada</p>
        </div>
        <ng-template #noIcon>
          <div class="h-16 flex items-center text-slate-500 text-sm italic">No se cargó icono</div>
        </ng-template>
      </div>

      <div class="md:col-span-1">
        <label class="text-slate-400 text-sm mb-2 block">Color Cover</label>
        <div class="flex gap-3">
          <input type="color" [value]="course.coverUrl" disabled
                 class="w-12 h-12 rounded-xl border border-slate-800 bg-transparent" />
          <input [value]="course.coverUrl" disabled
                 class="flex-1 h-12 px-4 rounded-xl bg-slate-950/60 border border-slate-800 text-slate-300" />
        </div>
      </div>

      <hr class="md:col-span-2 border-slate-800 my-2" />

      <div class="md:col-span-1">
        <label class="text-slate-400 text-sm mb-2 block">¿Curso Gratis?</label>
        <input [value]="course.free ? 'Sí, es gratuito' : 'No, es de pago'" disabled
               class="w-full h-12 px-5 rounded-xl bg-slate-950/60 border border-slate-800 text-slate-300" />
      </div>

      <div class="md:col-span-1" *ngIf="course.free === false">
        <label class="text-slate-400 text-sm mb-2 block">Plan requerido</label>
        <input [value]="course.requiredPlanCode" disabled
               class="w-full h-12 px-5 rounded-xl bg-slate-950/60 border border-slate-800 text-slate-300 font-mono text-cyan-400" />
      </div>

      <div class="md:col-span-1">
        <label class="text-slate-400 text-sm mb-2 block">Estado de Publicación</label>
        <div class="flex items-center gap-3 h-12 px-5 rounded-xl bg-slate-950/60 border border-slate-800">
           <span class="flex h-2 w-2 rounded-full" [ngClass]="course.published ? 'bg-green-500' : 'bg-red-500'"></span>
           <span class="text-slate-300">{{ course.published ? 'Publicado' : 'Borrador' }}</span>
        </div>
      </div>

    </div>

    <div class="mt-10">
      <button (click)="volver()" class="w-full h-14 rounded-full font-bold bg-slate-800 text-slate-200 hover:bg-slate-700 transition border border-slate-700">
        Volver al listado
      </button>
    </div>

  </div>
</div>
