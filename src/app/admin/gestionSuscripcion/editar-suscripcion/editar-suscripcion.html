<div class="flex items-center justify-center p-6">
    <div class="w-full max-w-3xl rounded-2xl
           bg-white text-slate-800 shadow-xl
           dark:bg-[#1e293b] dark:text-slate-200">

        <div class="p-8">
            <div class="flex items-center gap-4 mb-8">
                <div class="relative size-20 rounded-full bg-cover bg-center
                 ring-2 ring-slate-300 dark:ring-slate-700" [style.backgroundImage]="'url(' + suscripcion.photo + ')'">
                    <div
                        class="absolute -bottom-1 -right-1 size-7 bg-primary rounded-full flex items-center justify-center border-2 border-white dark:border-[#1e293b]">
                        <span class="material-symbols-outlined text-white text-[16px]">verified</span>
                    </div>
                </div>

                <div>
                    <h1 class="text-2xl font-bold tracking-tight dark:text-white">
                        Editar Suscripción
                    </h1>
                    <p class="text-slate-500 dark:text-white/50 text-sm mt-1">
                        Solo puedes modificar el plan y el estado
                    </p>
                </div>
            </div>

            <form class="flex flex-col gap-5">

                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-semibold uppercase tracking-wider
                   text-slate-500 dark:text-white/40 px-1">
                        Cliente
                    </label>

                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-slate-400 dark:text-white/40 text-xl">
                                person
                            </span>
                        </div>

                        <input type="text" [value]="suscripcion.fullName" readonly class="w-full rounded-xl pl-12 pr-4 py-3.5
                     bg-slate-100 border border-slate-200
                     text-slate-500 cursor-not-allowed
                     dark:bg-white/5 dark:border-white/5 dark:text-white/60" />
                    </div>
                </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-semibold uppercase tracking-wider
                   text-slate-500 dark:text-white/40 px-1">
                        Plan
                    </label>

                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-slate-400 dark:text-white/40 text-xl
             group-focus-within:text-primary">
                                workspace_premium
                            </span>
                        </div>

                        <select [(ngModel)]="suscripcion.plan" name="plan" class="w-full rounded-xl pl-12 pr-10 py-3.5
           bg-white border border-slate-300 text-slate-800
           focus:outline-none focus:ring-2 focus:ring-primary
           dark:bg-[#233648]/60 dark:border-white/10 dark:text-white">

                            <option *ngFor="let p of planes" [value]="p">
                                {{ planLabels[p] }}
                            </option>

                        </select>
                    </div>
                </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-semibold uppercase tracking-wider
                   text-slate-500 dark:text-white/40 px-1">
                        Estado
                    </label>

                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-slate-400 dark:text-white/40 text-xl
                       group-focus-within:text-primary">
                                toggle_on
                            </span>
                        </div>

                        <select [(ngModel)]="suscripcion.status" name="status" class="w-full rounded-xl pl-12 pr-10 py-3.5
                     bg-white border border-slate-300 text-slate-800
                     focus:outline-none focus:ring-2 focus:ring-primary
                     dark:bg-[#233648]/60 dark:border-white/10 dark:text-white">

                            <option value="ACTIVE">Activo</option>
                            <option value="CANCELED">Cancelado</option>
                            <option value="EXPIRED" disabled>Expirado</option>
                        </select>
                    </div>

                    <p *ngIf="suscripcion.status === 'CANCELED' && estadoOriginal !== 'CANCELED'" class="text-xs text-red-500 mt-2 px-1">
                        Al cancelar, la suscripción finalizará hoy
                    </p>
                </div>

                <div class="flex flex-col gap-3 pt-6 border-t
                    border-slate-200 dark:border-white/10">

                    <button type="button" (click)="abrirConfirmacion()" class="w-full py-4 rounded-xl font-bold text-white
                   bg-gradient-to-r from-cyan-500 to-blue-600
                   shadow-lg shadow-cyan-500/30
                   hover:opacity-95 active:scale-[0.98]
                   transition-all flex items-center justify-center gap-2">

                        <span class="material-symbols-outlined text-xl">
                            check_circle
                        </span>
                        Guardar Cambios
                    </button>

                    <button type="button" (click)="cancelar()" class="w-full py-3 rounded-xl font-semibold
                   bg-slate-200 text-slate-700
                   hover:bg-slate-300 hover:text-slate-900
                   dark:bg-white/10 dark:text-white/70
                   dark:hover:bg-white/20 dark:hover:text-white
                   transition-all">
                        Cancelar
                    </button>

                </div>
            </form>
        </div>
    </div>
</div>

<div *ngIf="mostrarConfirmacion" class="fixed inset-0 z-[60] flex items-center justify-center p-6
                bg-slate-900/60 backdrop-blur-md
                dark:bg-slate-950/80">

    <div class="w-full max-w-sm rounded-2xl p-6 text-center shadow-2xl
                bg-white text-slate-800 border border-slate-200
                dark:bg-[#0f172a] dark:text-slate-200 dark:border-white/10">

        <div class="size-14 rounded-full flex items-center justify-center mx-auto mb-4
                    bg-amber-500/15 dark:bg-amber-500/10">
            <span class="material-symbols-outlined text-amber-500 text-3xl">
                help
            </span>
        </div>

        <h4 class="text-lg font-bold mb-2">
            ¿Estás seguro de guardar los cambios?
        </h4>

        <p class="text-sm mb-8 leading-relaxed
                    text-slate-600 dark:text-slate-400">
            Esta acción se reflejará inmediatamente
        </p>

        <div class="flex flex-col gap-3">

            <button type="button" (click)="confirmarGuardar()" class="w-full py-3 rounded-xl font-bold text-sm text-white
                        bg-gradient-to-r from-cyan-500 to-blue-600
                        shadow-lg shadow-cyan-500/30
                        hover:opacity-95 active:scale-[0.97]
                        transition-all">
                Confirmar
            </button>

            <button type="button" (click)="cancelarConfirmacion()" class="w-full py-3 rounded-xl font-semibold text-sm
                        border border-slate-300 text-slate-700
                        hover:bg-slate-100
                        dark:border-white/10 dark:text-slate-300
                        dark:hover:bg-white/10
                        transition-all">
                Regresar
            </button>

        </div>
    </div>
</div>

<div *ngIf="mostrarExito" class="fixed inset-0 z-[70] flex items-center justify-center p-6
               bg-black/50 backdrop-blur-md">

    <div class="w-full max-w-sm rounded-2xl p-6 text-center
                   bg-white text-slate-800
                   border border-slate-200
                   shadow-2xl shadow-black/30
                   ring-1 ring-black/5
                   dark:bg-slate-900 dark:text-slate-100
                   dark:border-white/10 dark:ring-white/10">

        <div class="size-16 bg-blue-50 dark:bg-blue-900/30
                       text-primary rounded-full
                       flex items-center justify-center mx-auto mb-6">
            <span class="material-symbols-outlined text-3xl">
                task_alt
            </span>
        </div>

        <h3 class="text-lg font-bold mb-6">
            Actualización exitosa
        </h3>

        <button type="button" (click)="irListado()" class="w-full py-3 rounded-xl font-bold text-sm text-white
                       bg-gradient-to-r from-blue-500 to-cyan-600
                       hover:opacity-95 active:scale-[0.97]
                       transition-all">
            Aceptar
        </button>
    </div>
</div>

<div *ngIf="mostrarError" class="fixed inset-0 z-[70] flex items-center justify-center p-6
               bg-black/50 backdrop-blur-md">

    <div class="w-full max-w-sm rounded-2xl p-6 text-center
                   bg-white text-slate-800
                   border border-slate-200
                   shadow-2xl shadow-black/30
                   ring-1 ring-black/5
                   dark:bg-slate-900 dark:text-slate-100
                   dark:border-white/10 dark:ring-white/10">

        <div class="size-16 bg-red-100 dark:bg-red-900/30
                       text-red-600 rounded-full
                       flex items-center justify-center mx-auto mb-6">
            <span class="material-symbols-outlined text-3xl">
                error
            </span>
        </div>

        <h3 class="text-lg font-bold mb-6">
            Error al actualizar
        </h3>

        <button type="button" (click)="mostrarError = false" class="w-full py-3 rounded-xl font-bold text-sm text-white
                       bg-red-600 hover:bg-red-700
                       active:scale-[0.97] transition-all">
            Cerrar
        </button>
    </div>
</div>
