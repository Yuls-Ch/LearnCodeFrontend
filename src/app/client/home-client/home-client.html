<main
  class="relative h-screen w-full overflow-hidden flex items-start justify-start px-24 lg:px-24 pt-24 lg:pt-24 bg-[#F8FAFC] dark:bg-[#06080F]">

  <spline-viewer url="https://prod.spline.design/ntJA47FqEE83mHZS/scene.splinecode"
    class="absolute inset-0 w-full h-full z-10">
  </spline-viewer>

  <div class="absolute inset-0 z-20 pointer-events-none 
              bg-gradient-to-r from-white/95 via-white/50 to-transparent 
              dark:from-[#06080F]/95 dark:via-[#06080F]/50 dark:to-transparent">
  </div>

  <section class="relative z-30 w-full max-w-2xl animate-fade-in">

    <div
      class="inline-flex items-center gap-3 px-4 py-2 rounded-full bg-white/40 dark:bg-white/5 border border-slate-200 dark:border-white/10 backdrop-blur-md mb-8 shadow-sm">
      <span class="flex h-2 w-2 rounded-full bg-primary animate-pulse"></span>
      <span class="text-[10px] font-bold tracking-[0.1em] text-slate-500 dark:text-slate-400 uppercase">
        ACCEDE A UN CURSO AHORA
      </span>
    </div>

    <header class="mb-10">
      <p class="text-primary font-mono text-xl mb-4 tracking-tighter opacity-80">
        // Bienvenido, <span class="font-bold underline decoration-primary/30 underline-offset-4">{{ userName ||
          'Prueba' }}</span>
      </p>

      <h1 class="text-6xl lg:text-8xl font-black text-slate-900 dark:text-white leading-[0.95] tracking-tighter">
        Explora un <br>
        <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary via-cyan-400 to-blue-500">
          universo.
        </span>
      </h1>

      <p class="mt-8 text-slate-500 dark:text-slate-400 text-lg max-w-md leading-relaxed font-medium">
        Rutas de aprendizaje y diseño interactivo de vanguardia para mentes creativas.
      </p>
    </header>

    <div class="flex flex-col sm:flex-row gap-5">
      <a [routerLink]="['/client/curso']"
        class="px-10 py-5 bg-primary text-white font-bold rounded-2xl hover:scale-105 hover:shadow-[0_20px_40px_-12px_rgba(0,163,255,0.5)] transition-all duration-300 flex items-center justify-center gap-3 group text-sm uppercase tracking-wider cursor-pointer">
        Comenzar ahora
        <span
          class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
      </a>

      <a [routerLink]="['/client/plans']"
        class="px-10 py-5 bg-white/60 dark:bg-white/5 backdrop-blur-md border border-slate-200 dark:border-white/10 text-slate-700 dark:text-slate-200 font-bold rounded-2xl hover:bg-white dark:hover:bg-white/10 transition-all duration-300 shadow-sm flex items-center justify-center gap-2 text-sm uppercase tracking-wider cursor-pointer">
        <span class="material-symbols-outlined text-xl opacity-60">payments</span>
        Acceder a un Plan
      </a>
    </div>
  </section>

  <div class="absolute bottom-10 left-24 z-30 pointer-events-none flex flex-col gap-2">
    <div class="flex items-center gap-3 text-slate-400 dark:text-slate-500">
      <span class="material-symbols-outlined text-lg animate-bounce">mouse</span>
      <p class="text-[10px] font-bold tracking-[0.2em] uppercase opacity-60">Navegación 3D Activa</p>
    </div>
    <div class="h-[2px] w-32 bg-slate-200 dark:bg-white/10 overflow-hidden rounded-full">
      <div class="h-full bg-primary w-1/3 animate-progress"></div>
    </div>
  </div>

</main>
