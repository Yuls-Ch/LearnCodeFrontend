<div class="min-h-screen flex flex-col overflow-hidden bg-background-dark text-slate-100 font-display">
  
  <header class="h-16 border-b border-glass-border px-6 flex items-center justify-between bg-background-dark/80 backdrop-blur-md z-40">
    <div class="flex items-center gap-4">
        <a routerLink="/client/curso" class="p-2 rounded-full hover:bg-white/5 transition-colors">
            <span class="material-symbols-outlined text-slate-400">arrow_back</span>
        </a>
        <div>
            <h1 class="font-bold text-sm text-white">Contenido del Curso</h1>
            <div class="flex items-center gap-3 mt-1">
                <div class="w-32 h-1.5 bg-slate-800 rounded-full overflow-hidden">
                    <div class="h-full bg-gradient-to-r from-primary to-accent transition-all duration-500" [style.width.%]="progressPercentage"></div>
                </div>
                <span class="text-[10px] font-bold text-primary">{{ progressPercentage }}% Completado</span>
            </div>
        </div>
    </div>
  </header>

  <div class="flex-1 flex overflow-hidden">
    
    <aside class="w-80 border-r border-glass-border flex flex-col bg-background-dark/50 overflow-y-auto custom-scrollbar">
      <div class="p-4 space-y-2">
        <div class="text-[10px] font-bold uppercase tracking-widest text-slate-500 px-2 mb-2">Módulos</div>
        
        <div *ngFor="let mod of modules; let i = index" class="group">
          <div (click)="selectModule(mod)"
               [class.bg-primary-10]="currentModule?.id === mod.id"
               [class.border-l-2]="currentModule?.id === mod.id"
               [class.border-primary]="currentModule?.id === mod.id"
               [class.border-transparent]="currentModule?.id !== mod.id"
               class="flex items-center justify-between p-4 cursor-pointer hover:bg-slate-800/50 transition-all border-l-2">
            
            <div class="flex items-center gap-3">
               <div class="w-5 h-5 rounded-full flex items-center justify-center border transition-all"
                    [ngClass]="completedModuleIds.has(mod.id!) ? 'bg-emerald-500 border-emerald-500' : 'border-slate-600'">
                    <span *ngIf="completedModuleIds.has(mod.id!)" class="material-symbols-outlined text-xs text-black font-bold">check</span>
               </div>
               
               <div class="flex flex-col">
                   <span class="text-xs font-medium" [class.text-white]="currentModule?.id === mod.id" [class.text-slate-400]="currentModule?.id !== mod.id">
                       Módulo {{ i + 1 }}
                   </span>
                   <span class="text-sm font-bold text-slate-200 truncate max-w-[180px]">{{ mod.title }}</span>
               </div>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <main class="flex-1 flex flex-col bg-background-dark overflow-hidden relative">
      
      <div class="h-14 flex items-center justify-between px-6 glass-panel border-t-0 border-x-0 z-20">
        <span class="text-xs font-bold text-white">{{ currentModule?.title }}</span>
        
        <button *ngIf="currentModule && !completedModuleIds.has(currentModule.id!)" 
                (click)="markAsCompleted()"
                class="flex items-center gap-2 px-6 py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg shadow-emerald-500/20 transition-all transform hover:scale-105">
            <span class="material-symbols-outlined text-lg">check_circle</span>
            Marcar como Visto
        </button>

        <div *ngIf="currentModule && completedModuleIds.has(currentModule.id!)" 
             class="flex items-center gap-2 px-4 py-2 bg-slate-800 text-emerald-400 rounded-xl font-bold text-xs uppercase tracking-widest border border-emerald-500/30">
            <span class="material-symbols-outlined text-lg">verified</span>
            Completado
        </div>
      </div>

      <div class="flex-1 overflow-hidden pdf-canvas relative flex items-center justify-center bg-slate-950">
        <div *ngIf="isLoadingPdf" class="absolute inset-0 flex flex-col items-center justify-center z-50 bg-background-dark/80 backdrop-blur-sm">
            <div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin mb-4"></div>
            <span class="text-xs font-bold text-primary animate-pulse">Cargando Lección...</span>
        </div>

        <div *ngIf="pdfUrl; else emptyState" class="w-full h-full p-4 md:p-8 animate-in fade-in duration-300">
            <iframe [src]="pdfUrl" class="w-full h-full rounded-2xl shadow-2xl border border-glass-border bg-white" type="application/pdf"></iframe>
        </div>

        <ng-template #emptyState>
            <div class="text-center p-10 opacity-60">
                <span class="material-symbols-outlined text-6xl text-slate-700 mb-4">menu_book</span>
                <h3 class="text-xl font-bold text-slate-300">Selecciona un Módulo</h3>
            </div>
        </ng-template>
      </div>
    </main>
  </div>
</div>
