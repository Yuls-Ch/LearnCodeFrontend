<div class="min-h-screen flex flex-col overflow-hidden 
            bg-white dark:bg-[#050810] 
            text-slate-900 dark:text-slate-100 font-display">

  <!-- HEADER -->
  <header class="h-16 border-b px-6 flex items-center justify-between 
                 bg-white/80 dark:bg-[#050810]/80 
                 backdrop-blur-md z-40
                 border-slate-200 dark:border-white/10">

    <div class="flex items-center gap-4">

      <a routerLink="/client/curso" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/5 transition-colors">
        <span class="material-symbols-outlined text-slate-500 dark:text-slate-400">
          arrow_back
        </span>
      </a>

      <div>
        <h1 class="font-bold text-sm text-slate-900 dark:text-white">
          Contenido del Curso
        </h1>

        <div class="flex items-center gap-3 mt-1">
          <div class="w-32 h-1.5 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
            <div class="h-full bg-gradient-to-r from-primary to-accent transition-all duration-500"
              [style.width.%]="progressPercentage"></div>
          </div>

          <span class="text-[10px] font-bold text-primary">
            {{ progressPercentage }}% Completado
          </span>
        </div>
      </div>

    </div>
  </header>

  <!-- BODY -->
  <div class="flex-1 flex overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="w-80 border-r flex flex-col overflow-y-auto custom-scrollbar
                  bg-slate-50 dark:bg-[#050810]/50
                  border-slate-200 dark:border-white/10">

      <div class="p-4 space-y-2">

        <div class="text-[10px] font-bold uppercase tracking-widest 
                    text-slate-500 px-2 mb-2">
          Módulos
        </div>

        <div *ngFor="let mod of modules; let i = index" class="group">

          <div (click)="selectModule(mod)" class="flex items-center justify-between p-4 cursor-pointer transition-all border-l-2
               hover:bg-slate-200 dark:hover:bg-slate-800/50" [class.bg-primary-10]="currentModule?.id === mod.id"
            [class.border-primary]="currentModule?.id === mod.id"
            [class.border-transparent]="currentModule?.id !== mod.id">

            <div class="flex items-center gap-3">

              <div class="w-5 h-5 rounded-full flex items-center justify-center border transition-all" [ngClass]="completedModuleIds.has(mod.id!) 
                   ? 'bg-emerald-500 border-emerald-500' 
                   : 'border-slate-400 dark:border-slate-600'">

                <span *ngIf="completedModuleIds.has(mod.id!)"
                  class="material-symbols-outlined text-xs text-black font-bold">
                  check
                </span>
              </div>

              <div class="flex flex-col">
                <span class="text-xs font-medium" [class.text-slate-900]="currentModule?.id === mod.id"
                  [class.dark:text-white]="currentModule?.id === mod.id"
                  [class.text-slate-500]="currentModule?.id !== mod.id">

                  Módulo {{ i + 1 }}
                </span>

                <span class="text-sm font-bold 
                             text-slate-800 dark:text-slate-200 
                             truncate max-w-[180px]">
                  {{ mod.title }}
                </span>
              </div>

            </div>
          </div>

        </div>

      </div>
    </aside>

    <!-- MAIN -->
    <main class="flex-1 flex flex-col overflow-hidden relative
                 bg-white dark:bg-[#050810]">

      <!-- TOP BAR -->
      <div class="h-14 flex items-center justify-between px-6 glass-panel z-20">

        <span class="text-xs font-bold text-slate-900 dark:text-white">
          {{ currentModule?.title }}
        </span>

        <!-- BOTÓN -->
        <button *ngIf="currentModule && !completedModuleIds.has(currentModule.id!)" (click)="markAsCompleted()" class="flex items-center gap-2 px-6 py-2 
                       bg-emerald-500 hover:bg-emerald-600 
                       text-white rounded-xl font-bold text-xs uppercase tracking-widest
                       shadow-lg shadow-emerald-500/20 transition-all hover:scale-105">

          <span class="material-symbols-outlined text-lg">
            check_circle
          </span>

          Marcar como visto
        </button>

        <!-- COMPLETADO -->
        <div *ngIf="currentModule && completedModuleIds.has(currentModule.id!)" class="flex items-center gap-2 px-4 py-2 rounded-xl font-bold text-xs uppercase tracking-widest
                    bg-emerald-500/10 text-emerald-500 border border-emerald-500/30">

          <span class="material-symbols-outlined text-lg">
            verified
          </span>

          Completado
        </div>

      </div>

      <!-- PDF -->
      <div class="flex-1 flex items-center justify-center relative overflow-hidden
                  bg-slate-100 dark:bg-slate-950">

        <div *ngIf="pdfUrl; else emptyState" class="w-full h-full p-6">
          <iframe [src]="pdfUrl" class="w-full h-full rounded-2xl shadow-xl 
                         border border-slate-200 dark:border-white/10 
                         bg-white">
          </iframe>
        </div>

        <ng-template #emptyState>
          <div class="text-center opacity-60">
            <span class="material-symbols-outlined text-6xl text-slate-400 mb-4">
              menu_book
            </span>
            <h3 class="text-xl font-bold text-slate-600 dark:text-slate-300">
              Selecciona un Módulo
            </h3>
          </div>
        </ng-template>

      </div>

    </main>

  </div>
</div>
