<header
  class="sticky top-0 z-50 w-full bg-white/70 dark:bg-gray-900/80 backdrop-blur-md shadow-md border-b border-slate-200 dark:border-slate-800">

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-20 relative">
      <div class="flex items-center gap-12">
        <div class="flex items-center gap-3">
          <div
            class="w-12 h-12 bg-gradient-to-br from-primary to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-primary/30">
            <span class="material-symbols-outlined text-white text-2xl">code</span>
          </div>
          <a routerLink="/client/home">
            <span class="text-2xl font-bold text-slate-900 dark:text-white">
              Learn<span class="text-primary">Code</span>
            </span>
          </a>
        </div>

        <nav class="hidden md:flex items-center gap-8 absolute left-1/2 -translate-x-1/2">
          <a routerLink="/client/curso" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
            (click)="toggleMobileMenu()"
            class="text-lg font-semibold text-slate-800 dark:text-slate-100 hover:text-primary transition">
            Cursos
          </a>

          <a routerLink="/client/curso/progreso" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
            (click)="toggleMobileMenu()"
            class="text-lg font-semibold text-slate-800 dark:text-slate-100 hover:text-primary transition">
            Progreso
          </a>

          <a routerLink="/client/plans" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
            (click)="toggleMobileMenu()"
            class="text-lg font-semibold text-slate-800 dark:text-slate-100 hover:text-primary transition">
            Planes
          </a>

          <a routerLink="/client/subscription" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
            (click)="toggleMobileMenu()"
            class="text-lg font-semibold text-slate-800 dark:text-slate-100 hover:text-primary transition">
            Subscripción
          </a>
        </nav>
      </div>
      <div class="flex items-center gap-3">
        <button (click)="toggleTheme()"
          class="p-2 rounded-full bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:scale-110 transition-transform flex items-center justify-center">
          <span class="material-symbols-outlined text-xl" *ngIf="!isDarkMode">dark_mode</span>
          <span class="material-symbols-outlined text-xl" *ngIf="isDarkMode">light_mode</span>
        </button>

        <button type="button" (click)="toggleMobileMenu()" class="md:hidden w-10 h-10 flex items-center justify-center rounded-lg bg-slate-200 dark:bg-slate-800
                       text-slate-700 dark:text-slate-200 hover:bg-slate-300 dark:hover:bg-slate-700 transition">
          <span class="material-symbols-outlined text-[22px]">
            {{ mobileMenuOpen ? 'close' : 'menu' }}
          </span>
        </button>

        <div class="relative">
          <button (click)="toggleMenu()"
            class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 flex items-center justify-center text-slate-500">
            <img *ngIf="userPhoto; else defaultIcon" [src]="userPhoto" referrerpolicy="no-referrer"
              class="w-10 h-10 rounded-full object-cover border border-slate-300 dark:border-slate-700" />
            <ng-template #defaultIcon>
              <span class="material-symbols-outlined">person</span>
            </ng-template>
          </button>

          <div *ngIf="menuOpen" class="absolute right-0 mt-3 w-44 rounded-xl bg-white/70 dark:bg-gray-800/80
                      backdrop-blur-md shadow-lg overflow-hidden z-50">
            <button (click)="logout()" class="w-full px-4 py-3 text-left text-sm
                           text-slate-600 dark:text-slate-300
                           hover:bg-slate-200 dark:hover:bg-slate-700 transition flex items-center gap-2">
              🚪 Cerrar sesión
            </button>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="mobileMenuOpen" class="md:hidden sticky top-20 z-40 bg-white/95 dark:bg-gray-900/95
                backdrop-blur-md border-t border-slate-200 dark:border-slate-700 shadow-lg">
      <nav class="flex flex-col px-6 py-4 space-y-4">
        <a routerLink="/client/curso" routerLinkActive="active" (click)="toggleMobileMenu()"
          class="text-lg font-semibold text-slate-800 dark:text-slate-100 hover:text-primary transition">
          Cursos
        </a>
        
        <a routerLink="/client/curso/progreso" routerLinkActive="active" (click)="toggleMobileMenu()"
          class="text-lg font-semibold text-slate-800 dark:text-slate-100 hover:text-primary transition">
          Progreso
        </a>

        <a routerLink="/client/plans" routerLinkActive="active" (click)="toggleMobileMenu()"
          class="text-lg font-semibold text-slate-800 dark:text-slate-100 hover:text-primary transition">
          Planes
        </a>
        <a routerLink="/client/subscription" routerLinkActive="active" (click)="toggleMobileMenu()"
          class="text-lg font-semibold text-slate-800 dark:text-slate-100 hover:text-primary transition">
          Subscripción
        </a>
      </nav>
    </div>
  </div>
</header>

<main class="min-h-screen">
  <router-outlet></router-outlet>
  <app-chatbot></app-chatbot>
</main>

<footer class="py-12 border-t border-slate-200 dark:border-slate-800 text-center text-sm text-slate-500">
  © 2026 LearnCode. Todos los derechos reservados.
</footer>
